name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build Xcode (unsigned)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ios/build \
            build

      - name: Package IPA (unsigned)
        run: |
          mkdir -p ios/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/App.app ios/Payload/App.app
          cd ios && zip -r JES-unsigned.ipa Payload && rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: JES-iOS-unsigned
          path: ios/JES-unsigned.ipa
          retention-days: 30
